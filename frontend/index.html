<!DOCTYPE html>
<html>
<head>
  <title>GigShield AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>GigShield AI 🚀</h1>

<div class="card">
  <h2>Register</h2>
  <input id="name" placeholder="Name">
  <input id="city" placeholder="City">
  <button onclick="register()">Register</button>
</div>

<div class="card">
  <h2>Weekly Insurance</h2>
  <p id="premium">Premium: ₹--</p>
  <button onclick="calculatePremium()">Check Premium</button>
  <button onclick="buyPolicy()">Buy Policy</button>
</div>

<div class="card">
  <h2>Live Event Simulation</h2>
  <button onclick="simulateRain()">Simulate Heavy Rain</button>
</div>

<div class="card">
  <h2>Status</h2>
  <p id="status">No activity</p>
</div>

<script src="script.js"></script>
</body>
</html>
